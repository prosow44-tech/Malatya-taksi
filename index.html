<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malatya Taksi - Final Panel</title>
    <style>
        /* 1. TEMEL AYARLAR */
        :root {
            --taxi-yellow: #FFC107;
            --whatsapp-green: #25D366;
            --text-white: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: transparent;
            margin: 0;
            padding: 10px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 2. YAZI ALANLARI (Yükseklik arttırıldı çünkü emoji alta indi) */
        .text-wrapper {
            position: relative;
            width: 100%;
            height: 90px; /* Emoji alta indiği için burayı genişlettik */
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 5px;
        }

        .text-wrapper.bottom {
            margin-top: 20px;
            height: 45px; /* Alt kısım tek satır, kısa kalsın */
        }

        /* 3. NEONLU YAZILAR */
        .animated-text {
            position: absolute;
            width: 100%;
            text-align: center;
            font-size: 26px;
            font-weight: 800;
            color: var(--text-white);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.4s ease, transform 0.4s ease;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9); /* Okunabilirlik gölgesi */
            will-change: opacity, transform;
            line-height: 1.3;
        }

        .animated-text.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* EMOJİ AYARI (Alta inmesi için) */
        .emoji-row {
            display: block; /* Alt satıra atar */
            font-size: 32px; /* Emojiyi biraz büyüttük */
            margin-top: 5px; /* Yazı ile arası */
        }

        /* 🔥 NEON PARLAMA EFEKTİ 🔥 */
        .highlight { 
            color: var(--taxi-yellow); 
            text-transform: uppercase;
            text-shadow: 
                0 0 5px rgba(255, 193, 7, 0.8),
                0 0 15px rgba(255, 193, 7, 0.5),
                0 0 25px rgba(255, 193, 7, 0.3);
        }

        /* 4. BUTON GRUBU (DİKEY) */
        .btn-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        .action-btn {
            width: 85%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px 0;
            border-radius: 12px;
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            font-size: 20px;
            transition: transform 0.1s;
            border: none;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .action-btn:active { transform: scale(0.96); }

        /* ARAMA BUTONU */
        .btn-call {
            background: linear-gradient(135deg, #FFD700 0%, #FFC107 100%);
            color: #000;
            animation: pulse-yellow 2s infinite;
        }

        /* WHATSAPP BUTONU */
        .btn-wp {
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            animation: pulse-green 2s infinite;
            animation-delay: 1s; 
        }

        .btn-sub {
            font-size: 13px;
            font-weight: normal;
            margin-top: 5px;
            opacity: 0.9;
        }

        /* 5. ANİMASYONLAR */
        @keyframes pulse-yellow {
            0% { box-shadow: 0 0 0 0 rgba(255, 193, 7, 0.7); }
            70% { box-shadow: 0 0 0 12px rgba(255, 193, 7, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 193, 7, 0); }
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 12px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        /* MOBİL UYUM */
        @media (max-width: 350px) {
            .animated-text { font-size: 22px; }
            .emoji-row { font-size: 28px; }
            .action-btn { font-size: 18px; }
        }
    </style>
</head>
<body>

    <div class="text-wrapper">
        <div class="animated-text group-1 active">
            Malatya <span class="highlight">Taksi</span> Hizmeti
            <span class="emoji-row">🚖</span>
        </div>
        <div class="animated-text group-1">
            En <span class="highlight">Uygun</span> Fiyatlar
            <span class="emoji-row">🚕</span>
        </div>
        <div class="animated-text group-1">
            7/24 <span class="highlight">Acil</span> Ulaşım
            <span class="emoji-row">⚡</span>
        </div>
    </div>

    <div class="btn-container">
        <a href="tel:05332153481" class="action-btn btn-call">
            📞 HEMEN ARA
            <span class="btn-sub">Taksi Kapında!</span>
        </a>

        <a href="https://wa.me/905332153481?text=Merhaba,%20taksi%20çağırmak%20istiyorum." class="action-btn btn-wp" target="_blank">
            💬 WHATSAPP
            <span class="btn-sub">Konum Gönder</span>
        </a>
    </div>

    <div class="text-wrapper bottom">
        <div class="animated-text group-2 active">Devlet <span class="highlight">Hastanesi</span></div>
        <div class="animated-text group-2"><span class="highlight">Malatya</span> Park AVM</div>
        <div class="animated-text group-2">Şehirler Arası <span class="highlight">Transfer</span></div>
        <div class="animated-text group-2">Havalimanı <span class="highlight">Taksi</span></div>
        <div class="animated-text group-2">Otogar <span class="highlight">Taksi</span></div>
        <div class="animated-text group-2"><span class="highlight">Battalgazi</span> & <span class="highlight">Yeşilyurt</span></div>
    </div>

    <script>
        function startLoop(selector, interval) {
            const items = document.querySelectorAll(selector);
            let currentIndex = 0;

            setInterval(() => {
                items[currentIndex].classList.remove('active');
                currentIndex = (currentIndex + 1) % items.length;
                items[currentIndex].classList.add('active');
            }, interval);
        }

        startLoop('.group-1', 2500); 
        startLoop('.group-2', 2000); 
    </script>

</body>
</html>
