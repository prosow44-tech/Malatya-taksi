<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taksi Malatya - Ramazan Kılıç</title>
    <style>
        /* 1. TEMEL AYARLAR */
        :root {
            --taxi-yellow: #ffca08;
            --whatsapp-green: #25d366;
            --bg-dark: #0a0a0a;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark); color: white; scroll-behavior: smooth;
        }

        /* 2. ÜST MENÜ */
        header {
            background-color: #1a1a1a; padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--taxi-yellow); position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-weight: bold; font-size: 1.2rem; }
        .logo span { color: var(--taxi-yellow); }

        /* 3. ANA GÖRSEL ALANI (GIPHY ARKA PLAN) */
        .hero {
            position: relative; width: 100%; height: 85vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://media3.giphy.com/media/8vOF7lHxRwAMdpiqB5/giphy.gif');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        .main-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 25px; text-shadow: 2px 2px 15px rgba(0,0,0,1); }
        .main-title span { color: var(--whatsapp-green); }

        /* 4. BUTONLAR */
        .btn-group { display: flex; gap: 15px; width: 90%; max-width: 500px; }

        .btn {
            flex: 1; padding: 15px 5px; border-radius: 15px; text-decoration: none; color: white;
            display: flex; flex-direction: column; align-items: center; font-weight: bold;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5); transition: transform 0.2s;
        }

        .btn-call { background: linear-gradient(135deg, #ff9800, #f57c00); color: #000; }
        .btn-whatsapp { background: linear-gradient(135deg, #25d366, #128c7e); }
        .btn:active { transform: scale(0.95); }

        .btn-main { font-size: 1.1rem; }
        .btn-sub { font-size: 0.7rem; font-weight: normal; opacity: 0.9; }

        .sub-title { font-size: 1.4rem; font-weight: bold; margin-top: 25px; }
        .sub-title span { color: var(--taxi-yellow); }

        /* 5. ÖZELLİKLER BÖLÜMÜ (İKONLAR) */
        .features-container {
            display: flex; justify-content: space-around; flex-wrap: wrap;
            padding: 50px 5%; background-color: #111; gap: 30px;
        }

        .feature-item { 
            display: flex; flex-direction: column; align-items: center; 
            text-align: center; transition: transform 0.3s ease; flex: 1; min-width: 250px;
        }

        .feature-item:hover { transform: translateY(-10px); }

        .icon-circle { 
            width: 90px; height: 90px; background-color: var(--taxi-yellow); 
            border-radius: 50%; display: flex; justify-content: center; align-items: center; 
            font-size: 40px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
            border: 3px solid white; color: #000;
        }

        .f-title { font-weight: 800; font-size: 19px; color: var(--taxi-yellow); text-transform: uppercase; }
        .f-subtitle { font-size: 14px; color: #ccc; margin-top: 5px; }

        /* MOBİL UYUM */
        @media (max-width: 600px) {
            .btn-group { flex-direction: column; }
            .hero { height: auto; padding: 80px 0; }
            .main-title { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">🚖 Taksi <span>Malatya</span> - Ramazan Kılıç</div>
    </header>

    <section class="hero">
        <div class="main-title">7/24 <span>Güvenli</span> Yolculuk 🛡️</div>

        <div class="btn-group">
            <a href="tel:05332153481" class="btn btn-call">
                <span class="btn-main">📞 HEMEN ARA</span>
                <span class="btn-sub">Tıkla ve Çağır</span>
            </a>

            <a href="https://wa.me/905332153481" class="btn btn-whatsapp">
                <span class="btn-main">💬 WHATSAPP</span>
                <span class="btn-sub">Konum Gönder</span>
            </a>
        </div>

        <div class="sub-title">Havalimanı <span>VIP</span> Transfer</div>
    </section>

    <section class="features-container">
        <div class="feature-item">
            <div class="icon-circle">✨</div>
            <div class="f-title">VIP & KONFORLU</div>
            <div class="f-subtitle">Temiz ve yüksek modelli araçlar</div>
        </div>

        <div class="feature-item">
            <div class="icon-circle">💰</div>
            <div class="f-title">UYGUN FİYAT</div>
            <div class="f-subtitle">Ekonomik tarifeler, kaliteli ulaşım</div>
        </div>

        <div class="feature-item">
            <div class="icon-circle">⏱️</div>
            <div class="f-title">TAM ZAMANINDA</div>
            <div class="f-subtitle">Dakik sürüş, en hızlı rotalar</div>
        </div>
    </section>

</body>
</html>
