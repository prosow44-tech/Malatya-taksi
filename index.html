<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Malatya-Taksi Zeynal Ağca | 7/24 VIP Ulaşım</title>
    <meta name="description" content="Malatya'da konforlu, güvenli ve lüks taksi hizmeti.">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --taxi-yellow: #ffca08;
            --taxi-orange: #ff8008;
            --glass-border: rgba(255, 255, 255, 0.15);
            --gb-blur: blur(30px);
            --text-white: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; font-family: 'Montserrat', sans-serif;
            background-color: #000; color: var(--text-white); scroll-behavior: smooth;
            overflow-x: hidden; /* Sağa kaymayı kesin olarak engeller */
        }

        /* 1. NEON BAR */
        @keyframes flow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        .neon-bar {
            height: 6px; width: 100%;
            background: linear-gradient(90deg, var(--taxi-yellow), var(--taxi-orange), var(--taxi-yellow));
            background-size: 200% 100%;
            animation: flow 2s linear infinite;
            box-shadow: 0 0 20px rgba(255, 202, 8, 0.6);
            z-index: 100; position: relative;
        }

        /* 2. HEADER */
        header {
            background: rgba(0, 0, 0, 0.8); backdrop-filter: var(--gb-blur); -webkit-backdrop-filter: var(--gb-blur);
            padding: 10px 5%; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo { 
            font-weight: 700; font-size: 1.3rem; letter-spacing: -0.5px; 
            display: flex; align-items: center; gap: 8px;
        }
        
        .logo span { 
            color: var(--taxi-yellow); font-weight: 900; text-transform: uppercase;
            background: linear-gradient(to right, #ffca08, #fff, #ffca08);
            background-size: 200% auto; -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; animation: shine 3s linear infinite;
        }

        .status-active {
            font-weight: 900; color: #00ff88; font-size: 0.7rem;
            background: rgba(0, 255, 136, 0.15);
            padding: 6px 12px; border-radius: 40px; border: 1px solid #00ff88;
            display: flex; align-items: center; gap: 6px;
        }

        .status-dot {
            width: 10px; height: 10px; background-color: #00ff88;
            border-radius: 50%; animation: signal-glow 1.5s infinite;
        }

        @keyframes signal-glow {
            0% { box-shadow: 0 0 5px #00ff88; transform: scale(1); }
            50% { box-shadow: 0 0 20px #00ff88; transform: scale(1.2); }
            100% { box-shadow: 0 0 5px #00ff88; transform: scale(1); }
        }

        /* 3. HERO */
        .hero {
            position: relative; width: 100%; height: 90vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.4)), url('ezgif.com-animated-gif-maker.gif') no-repeat center center;
            background-size: cover; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .text-wrapper { position: relative; width: 90%; height: 60px; display: flex; justify-content: center; align-items: center; }
        .anim-text {
            position: absolute; font-size: 30px; font-weight: 900; color: #fff;
            text-shadow: 0 2px 15px rgba(0,0,0,0.8); opacity: 0; transition: 0.6s; text-align: center;
        }
        .anim-text.active { opacity: 1; }

        /* BUTONLAR (MOBİL ODAKLI) */
        .btn-container { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; margin: 20px 0; }
        .my-btn {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 85%; max-width: 300px; height: 80px; color: white; font-weight: bold; text-decoration: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); transition: 0.3s; font-size: 18px;
        }
        .btn-call { background: linear-gradient(to bottom, #FF8008, #FFA500); border-radius: 20px; color: #000; }
        .btn-wp { background: linear-gradient(to bottom, #25d366, #128C7E); border-radius: 20px; }

        /* YÜZEN BUTON */
        .sticky-call {
            position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px;
            background: #ffca08; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 25px; text-decoration: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4); z-index: 9999;
            animation: pulse-button 2s infinite;
        }

        /* 4. HAKKIMIZDA */
        .about-wrap { padding: 60px 5%; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)), url('gece.webp') center; background-size: cover; }
        .about-box {
            background: rgba(0, 0, 0, 0.6); backdrop-filter: var(--gb-blur);
            padding: 40px 20px; border-radius: 30px; width: 100%; box-sizing: border-box;
            border: 1px solid var(--glass-border);
        }

        .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 20px; margin-top: 40px; }
        .f-item { text-align: center; }
        .icon {
            width: 60px; height: 60px; background: var(--taxi-yellow); border-radius: 50%;
            display: inline-flex; justify-content: center; align-items: center; font-size: 30px;
            margin-bottom: 10px; border: 2px solid white;
        }
        .f-title { font-weight: 800; font-size: 14px; color: var(--taxi-yellow); }
        .f-desc { font-size: 12px; color: #ccc; }

        footer { background: #000; padding: 40px 5%; text-align: center; font-size: 13px; color: #888; }

        /* MASAÜSTÜ İÇİN DÜZELTME */
        @media (min-width: 769px) {
            .btn-container { flex-direction: row; justify-content: center; }
            .anim-text { font-size: 45px; }
            .logo { font-size: 1.6rem; }
            .about-box { padding: 70px 50px; }
            .text-wrapper { height: 100px; }
        }
    </style>
</head>
<body>

    <div class="neon-bar"></div>

    <header>
        <div class="logo"><span>🚖 Malatya-Taksi</span> Zeynal</div>
        <div class="status-active"><span class="status-dot"></span> AKTİF</div>
    </header>

    <section class="hero">
        <div class="text-wrapper">
            <div class="anim-text g1 active">Malatya <span style="color:#FFD700">VIP</span> Taksi</div>
            <div class="anim-text g1">Konforlu ve Güvenli</div>
            <div class="anim-text g1">7/24 <span style="color:#00ff88">Lüks</span> Ulaşım</div>
        </div>

        <div class="btn-container">
            <a href="tel:05332153481" class="my-btn btn-call">📞 HEMEN ARA</a>
            <a href="https://wa.me/905332153481" target="_blank" class="my-btn btn-wp">💬 WHATSAPP</a>
        </div>

        <div class="text-wrapper">
            <div class="anim-text g2 active">Havalimanı Transfer</div>
            <div class="anim-text g2">VIP Şehir İçi Tur</div>
            <div class="anim-text g2">Otogar Hattı</div>
        </div>
    </section>

    <a href="tel:05332153481" class="sticky-call">📞</a>

    <section class="about-wrap">
        <div class="about-box">
            <h2 style="color:var(--taxi-yellow); text-align:center; font-size:2rem;">Hakkımızda</h2>
            <p style="text-align:center; color:#eee; font-size:1.1rem; line-height:1.6;">Lüks ve güveni Malatya'nın her noktasına taşıyoruz.</p>
            <div class="features-grid">
                <div class="f-item"><div class="icon">🚕</div><div class="f-title">7/24</div></div>
                <div class="f-item"><div class="icon">💰</div><div class="f-title">NET FİYAT</div></div>
                <div class="f-item"><div class="icon">✨</div><div class="f-title">LÜKS</div></div>
                <div class="f-item"><div class="icon">⏱️</div><div class="f-title">HIZLI</div></div>
            </div>
        </div>
    </section>

    <footer>© 2026 Zeynal Ağca - Malatya VIP Hattı</footer>

    <script>
        function loop(s, t) {
            const el = document.querySelectorAll(s); let i = 0;
            if(el.length > 0) {
                setInterval(() => { el[i].classList.remove('active'); i = (i + 1) % el.length; el[i].classList.add('active'); }, t);
            }
        }
        loop('.g1', 2500); loop('.g2', 2000);
    </script>
</body>
</html>
